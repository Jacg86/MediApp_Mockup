<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediApp - Perfil Tienda</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="store-profile-body">

    <!-- Navbar Principal -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="home.html" class="nav-logo">
                    <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span>MediApp</span>
                </a>
            </div>

            <div class="nav-right nav-links-right">
                <span class="store-name-header">Tienda Super Ahorro</span>
                <a href="index.html" class="btn-logout">Cerrar sesión</a>
                <div class="user-avatar-small" style="background-color: #cdd4c2;">
                    <!-- Placeholder de avatar pequeño tienda -->
                </div>
            </div>
        </div>
    </nav>

    <main class="store-profile-main">
        
        <div class="profile-page-header store-header">
            <h1>Gestiona el Perfil de tu Tienda</h1>
        </div>

        <div class="store-grid-layout">
            
            <!-- Izquierda: Información del Negocio -->
            <div class="profile-card store-card-left">
                <h2 class="card-title">Información del Negocio</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre del Negocio</label>
                        <input type="text" value="Tienda Super Ahorro">
                    </div>
                    <div class="form-group">
                        <label>NIT</label>
                        <input type="text" value="900.123.456-7">
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección Física</label>
                    <input type="text" value="Avenida Siempre Viva 742">
                </div>

                <div class="form-group">
                    <label>Número de Contacto</label>
                    <input type="text" value="310 123 4567">
                </div>

                <div class="card-actions-right">
                    <button class="btn-submit btn-auto-width">Guardar Cambios</button>
                </div>
            </div>

            <!-- Derecha: Seguridad -->
            <div class="profile-card store-card-right">
                <h2 class="card-title">Seguridad de la Cuenta</h2>
                
                <p class="card-text-muted">Mantener tu contraseña segura es clave para proteger la información de tu negocio.</p>
                
                <button class="btn-gray-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Cambiar Contraseña
                </button>
            </div>

        </div>

    </main>

</body>
</html>
