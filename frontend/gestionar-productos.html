<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestionar productos en MediApp.">
    <title>MediApp - Gestionar Productos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .product-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }
        .product-info {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .product-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e293b;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2de07b;
            margin-bottom: 4px;
        }
        .product-original-price {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .product-stock {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 8px;
        }
        .product-actions {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #f1f5f9;
            background: #f8fafc;
        }
        .product-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-edit {
            background: #e2e8f0;
            color: #475569;
        }
        .btn-edit:hover { background: #cbd5e1; }
        .btn-delete {
            background: #fee2e2;
            color: #ef4444;
        }
        .btn-delete:hover { background: #fecaca; }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            background: white;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body class="store-profile-body">

    <!-- Navbar Principal -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="home.html" class="nav-logo">
                    <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span>MediApp</span>
                </a>
            </div>
            
            <span class="store-name-header">Mi Tienda</span>

            <div class="nav-right nav-links-right">
                <a href="perfil-tienda.html" class="nav-link">Volver al Perfil</a>
                <a href="#" class="btn-logout" onclick="event.preventDefault(); cerrarSesion();">Cerrar sesión</a>
                <div class="user-avatar-small" style="background-color: #cdd4c2;"></div>
            </div>
        </div>
    </nav>

    <main class="store-profile-main" style="max-width: 1200px;">
        
        <div class="profile-page-header store-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1 style="margin-bottom: 5px;">Mis Productos</h1>
                <p style="color: #64748b; margin: 0;">Gestiona el catálogo de tu tienda aquí.</p>
            </div>
            <button class="btn-light-green" id="btn-nuevo-producto" style="display: inline-flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Nuevo Producto
            </button>
        </div>

        <!-- Lista de Productos -->
        <div class="products-grid" id="productos-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="margin-bottom: 10px; color: #94a3b8;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <h3>Cargando productos...</h3>
            </div>
        </div>

    </main>

    <!-- Modal Crear/Editar Producto -->
    <div class="modal-overlay" id="modal-producto" style="display: none;">
        <div class="modal-content" style="max-width: 600px; width: 100%; padding: 30px;">
            <h3 id="modal-titulo" style="font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; color: #1e293b;">Nuevo Producto</h3>
            <form id="form-producto" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="hidden" id="prod-id">
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Nombre del Producto <span style="color: #ef4444;">*</span></label>
                    <input type="text" id="prod-nombre" required class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Categoría <span style="color: #ef4444;">*</span></label>
                        <select id="prod-categoria" required class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; background-color: white;">
                            <option value="">Selecciona categoria...</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Stock <span style="color: #ef4444;">*</span></label>
                        <input type="number" id="prod-stock" min="0" required class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Precio Original <span style="color: #ef4444;">*</span></label>
                        <input type="number" id="prod-precio-original" step="0.01" required class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Precio de Oferta</label>
                        <input type="number" id="prod-precio-oferta" step="0.01" class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Fecha de Vencimiento (Opcional)</label>
                        <input type="date" id="prod-vencimiento" class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>URL de la Imagen (Opcional)</label>
                        <input type="url" id="prod-imagen" placeholder="https://..." class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Descripción</label>
                    <textarea id="prod-descripcion" rows="3" class="input-modern" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div class="modal-actions" style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                    <button type="button" class="btn-gray-outline" id="btn-cancelar-modal" style="width: auto; padding: 10px 20px;">Cancelar</button>
                    <button type="submit" class="btn-light-green" style="width: auto; padding: 10px 20px;">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/gestionarProductos.js"></script>
</body>
</html>
