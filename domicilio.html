<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domicilio | MediApp</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="home-body">

<nav class="main-nav">
    <div class="nav-container">
        <div class="nav-left">
            <a href="home.html" class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>MediApp</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="perfil-persona.html" class="nav-avatar-link"><div class="user-avatar"></div></a>
        </div>
    </div>
</nav>

<main class="home-main">

<div class="section-header">
<h1>Entrega a domicilio</h1>
<p>Confirma la dirección de entrega</p>
</div>

<div class="profile-card">

<div class="form-group">
<label>Dirección</label>
<input type="text" placeholder="Calle 10 #25-30">
</div>

<div class="form-group">
<label>Ciudad</label>
<input type="text" placeholder="Santa Marta">
</div>

<div class="form-group">
<label>Teléfono</label>
<input type="text" placeholder="3001234567">
</div>

<div class="card-actions">
<button type="button" class="btn-submit" onclick="alert('¡Pedido verificado exitosamente!'); window.location.href='home.html';">
Confirmar pedido
</button>
</div>

</div>

</main>

</body>
</html>
