<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediApp - Mi Perfil</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="profile-body">

    <!-- Navbar Principal -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="home.html" class="nav-logo">
                    <svg viewBox="0 0 24 24" fill="none" class="logo-svg" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span>MediApp</span>
                </a>
            </div>

            <div class="nav-right nav-links-right">
                <a href="home.html" class="nav-link">Home</a>
                <a href="#" class="nav-link">Products</a>
                <a href="perfil-persona.html" class="nav-link active-link">My Profile</a>
                <a href="index.html" class="btn-logout">Logout</a>
                <div class="user-avatar-small">
                    <!-- Placeholder de avatar pequeño -->
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-main">
        
        <div class="profile-page-header">
            <h1>Mi Perfil</h1>
        </div>

        <section class="profile-user-info">
            <div class="profile-avatar-large">
                <!-- Imagen simulada con CSS -->
                <div class="avatar-illustration">
                    <div class="avatar-head"></div>
                    <div class="avatar-body"></div>
                </div>
            </div>
            <h2 class="profile-name">Juan Pérez</h2>
            <p class="profile-email">juan.perez@email.com</p>
            <button class="btn-change-photo">Cambiar Foto</button>
        </section>

        <!-- Información Personal -->
        <div class="profile-card">
            <h3 class="card-title">Información Personal</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" value="Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" value="juan.perez@email.com" class="input-readonly" readonly>
                </div>
            </div>
            
            <div class="card-actions">
                <button class="btn-light-green">Editar</button>
            </div>
        </div>

        <!-- Dirección -->
        <div class="profile-card">
            <h3 class="card-title">Dirección de Entrega/Recogida</h3>
            
            <div class="form-group">
                <label>Tu Dirección Principal</label>
                <input type="text" value="Av. Siempre Viva 742, Springfield">
            </div>
            
            <div class="card-actions">
                <button class="btn-light-green">Editar</button>
            </div>
        </div>

        <!-- Seguridad -->
        <div class="profile-card profile-card-flex">
            <div>
                <h3 class="card-title">Seguridad de la Cuenta</h3>
                <p class="card-subtitle">¿Deseas actualizar tu contraseña?</p>
            </div>
            <div>
                <button class="btn-submit btn-auto-width">Cambiar Contraseña</button>
            </div>
        </div>

    </main>

    <footer class="auth-footer profile-footer">
        <div class="footer-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2de07b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px; margin-right:6px; vertical-align:middle;">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            © 2024 MediApp. Todos los derechos reservados.
        </div>
        <div class="footer-right">
            <a href="#">Términos de Servicio</a>
            <a href="#">Política de Privacidad</a>
            <a href="#">Ayuda</a>
        </div>
    </footer>

</body>
</html>
